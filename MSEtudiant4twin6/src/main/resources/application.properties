spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

spring.application.name=MSEtudiant4twin6

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# RabbitMQ (audit des événements grade.* depuis MSNotes)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoints.web.exposure.include=refresh

welcome.message=Welcome to MSEtudiant4twin6 MS

# Agrégation portail étudiant (notes / matières / classe) via la gateway
app.gateway.base-url=http://localhost:8087
